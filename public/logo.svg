<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="160" y1="96" x2="864" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#234A73"/>
      <stop offset="0.5" stop-color="#122033"/>
      <stop offset="1" stop-color="#060A10"/>
    </linearGradient>
    <radialGradient id="glow" cx="500" cy="420" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="248" y1="268" x2="776" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset="0.35" stop-color="#34D399"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="signal" x1="720" y1="248" x2="944" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- TV (hero element — no tiny remote clutter) -->
  <rect x="148" y="220" width="728" height="456" rx="64" fill="#0A1018"/>
  <rect x="148" y="220" width="728" height="456" rx="64" fill="none" stroke="#E2E8F0" stroke-width="20"/>
  <rect x="196" y="268" width="632" height="360" rx="40" fill="url(#screen)"/>
  <path d="M404 376 L636 448 L404 520 Z" fill="#FFFFFF"/>

  <!-- Stand -->
  <rect x="416" y="696" width="192" height="48" rx="18" fill="#64748B"/>
  <rect x="336" y="744" width="352" height="40" rx="20" fill="#94A3B8"/>

  <!-- Single bold cast arc -->
  <path d="M792 276c132 132 132 296 0 428" fill="none" stroke="url(#signal)" stroke-width="40" stroke-linecap="round"/>
  <path d="M860 204c196 196 196 440 0 636" fill="none" stroke="url(#signal)" stroke-width="32" stroke-linecap="round" opacity="0.55"/>
</svg>